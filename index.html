<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAutopsy — Understand copied code</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🔬</span>
      <div>
        <h1>CodeAutopsy</h1>
        <p>Understand copied code with AI-powered autopsy reports</p>
      </div>
    </div>
    <span class="badge">Student-focused</span>
  </header>

  <main>
    <section class="card">
      <h2>Paste your code</h2>
      <div class="field-row">
        <label for="lang">Language</label>
        <select id="lang">
          <option>Auto-detect</option>
          <option>Python</option>
          <option>JavaScript</option>
          <option>Java</option>
          <option>C</option>
          <option>C++</option>
          <option>HTML/CSS</option>
          <option>SQL</option>
        </select>
      </div>
      <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
      <details>
        <summary>API settings</summary>
        <label for="provider">Provider</label>
        <select id="provider">
          
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter</option>
          <option value="grok">Groq</option>
        </select>
        <label for="model">Model</label>
        <input id="model" type="text" value="gemini-2.5-flash" />
        <label for="apiKey" style="display: flex; justify-content: space-between; align-items: center;">
          <span>API key</span>
          <a id="apiHelpLink" href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size: 0.8rem; color: #38bdf8; text-decoration: none;">Get Gemini key</a>
        </label>
        <input id="apiKey" type="password" placeholder="Paste API key here" />
        <p>Recommended Grok API</p>
      </details>
      
      <div class="field-row">
        <label><input id="demoMode" type="checkbox" /> Demo mode</label>
      </div>
      <button class="btn-primary" id="runBtn">🔬 Run Autopsy</button>
      <div id="errBox" class="err hidden"></div>
    </section>

    <section class="card">
      <h2>Autopsy report</h2>
      <div class="tabs" id="tabs">
        <button data-t="overview" class="active">Overview</button>
        <button data-t="lines">Line-by-line</button>
        <button data-t="bugs">Bugs</button>
        <button data-t="quiz">Quiz</button>
      </div>
      <div id="tab-overview"><div class="placeholder">No report yet.</div></div>
      <div id="tab-lines" class="hidden"></div>
      <div id="tab-bugs" class="hidden"></div>
      <div id="tab-quiz" class="hidden"></div>
    </section>
  </main>

  <footer>CodeAutopsy — your key stays in the browser</footer>
  <script src="js/app.js"></script>
</body>
</html>
